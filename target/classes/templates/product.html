<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 20px 0;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        .btn {
            border-radius: 25px;
            padding: 10px 30px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn-info { background: linear-gradient(45deg, #ff9a9e, #fecfef); border: none; }
        .btn-success { background: linear-gradient(45deg, #28a745, #20c997); border: none; }
        .btn-secondary { background: linear-gradient(45deg, #6c757d, #495057); border: none; }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .alert {
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" th:href="@{/}">
                <i class="fas fa-arrow-left me-2"></i>Back to Home
            </a>
            <span class="navbar-text text-white fw-bold">
                <i class="fas fa-box me-2"></i>Product Management
            </span>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-center mt-5">Product Management</h1>

        <!-- View Product Section -->
        <div class="card">
            <div class="card-header bg-info text-white">
                <i class="fas fa-eye me-2"></i>View Product
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4"><strong>ID:</strong> <span th:text="${product.id}"></span></div>
                    <div class="col-md-4"><strong>Name:</strong> <span th:text="${product.name}"></span></div>
                    <div class="col-md-4"><strong>Price:</strong> ₹<span th:text="${product.price}"></span></div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-4"><strong>Stock:</strong> <span th:text="${product.stock}"></span></div>
                </div>
            </div>
        </div>

        <!-- Update Stock Section -->
        <div class="card">
            <div class="card-header bg-success text-white">
                <i class="fas fa-plus-circle me-2"></i>Update Stock
            </div>
            <div class="card-body">
                <form th:action="@{/product/updateStock}" method="post">
                    <div class="mb-3">
                        <label for="quantity" class="form-label">
                            <i class="fas fa-cubes me-2"></i>Quantity to Add
                        </label>
                        <input type="number" class="form-control" id="quantity" name="quantity" required min="1">
                    </div>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save me-2"></i>Update Stock
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
