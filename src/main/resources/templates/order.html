<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #00A86B 0%, #32CD32 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 20px 0;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        .btn {
            border-radius: 25px;
            padding: 10px 30px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn-success { background: linear-gradient(45deg, #28a745, #20c997); border: none; }
        .btn-warning { background: linear-gradient(45deg, #ffc107, #fd7e14); border: none; }
        .btn-info { background: linear-gradient(45deg, #00A86B, #32CD32); border: none; }
        .btn-secondary { background: linear-gradient(45deg, #6c757d, #495057); border: none; }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .alert {
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" th:href="@{/}">
                <i class="fas fa-arrow-left me-2"></i>Back to Home
            </a>
            <span class="navbar-text text-white fw-bold">
                <i class="fas fa-shopping-cart me-2"></i>Order Management
            </span>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-center mt-5">Order Management</h1>

        <!-- Create New Order Section -->
        <div class="card">
            <div class="card-header bg-success text-white">
                <i class="fas fa-plus-circle me-2"></i>Create New Order
            </div>
            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger mb-3">
                    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                </div>
                <p class="text-muted">Select a product and quantity. The order will be created in <strong>Processing</strong> status.</p>
                <div class="d-flex align-items-center gap-3 mb-3">
                    <label class="fw-bold">New Order ID:</label>
                    <span class="badge bg-dark fs-6" th:text="${nextOrderId}"></span>
                </div>
                <form th:action="@{/order/create}" method="post">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-5">
                            <label class="form-label fw-semibold">Product</label>
                            <select class="form-select" name="productId" required>
                                <option value="" disabled selected>-- Select a product --</option>
                                <option th:each="product : ${products}"
                                        th:value="${product.id}"
                                        th:text="${product.name + ' (Stock: ' + product.stock + ')'}"
                                        th:disabled="${product.stock == 0}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Quantity</label>
                            <input type="number" class="form-control" name="quantity" min="1" value="1" required />
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-save me-2"></i>Create New Order
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Orders List Section -->
        <div class="card">
            <div class="card-header bg-info text-white">
                <i class="fas fa-list me-2"></i>All Orders
            </div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>No orders yet. Click "Create New Order" above to get started.
                </div>
                <div th:unless="${#lists.isEmpty(orders)}">
                    <div th:each="order : ${orders}" class="border rounded p-3 mb-3 bg-light">
                        <div class="row align-items-center">
                            <div class="col-md-2">
                                <strong>Order ID:</strong>
                                <span th:text="${order.id}" class="badge bg-dark fs-6"></span>
                            </div>
                            <div class="col-md-2">
                                <strong>Status:</strong>
                                <span th:if="${order.status == 'Pending'}" class="badge bg-secondary">Pending</span>
                                <span th:if="${order.status == 'Processing'}" class="badge bg-warning">Processing</span>
                                <span th:if="${order.status == 'Shipped'}" class="badge bg-primary">Shipped</span>
                                <span th:if="${order.status == 'Delivered'}" class="badge bg-success">Delivered</span>
                            </div>
                            <div class="col-md-3">
                                <strong>Product:</strong>
                                <span th:text="${order.productName != null ? order.productName : '—'}"></span>
                            </div>
                            <div class="col-md-1">
                                <strong>Qty:</strong>
                                <span th:text="${order.quantity > 0 ? order.quantity : '—'}"></span>
                            </div>
                            <div class="col-md-4 text-end">
                                <!-- Change Status Button -->
                                <form th:action="@{/order/updateStatus}" method="post" class="d-inline-flex gap-2 align-items-center">
                                    <input type="hidden" name="orderId" th:value="${order.id}" />
                                    <label class="fw-semibold small me-1">Change Status:</label>
                                    <select class="form-select form-select-sm" name="status" required style="width: auto;">
                                        <option value="Pending" th:selected="${order.status == 'Pending'}">Pending</option>
                                        <option value="Processing" th:selected="${order.status == 'Processing'}">Processing</option>
                                        <option value="Shipped" th:selected="${order.status == 'Shipped'}">Shipped</option>
                                        <option value="Delivered" th:selected="${order.status == 'Delivered'}">Delivered</option>
                                    </select>
                                    <button type="submit" class="btn btn-warning btn-sm">
                                        <i class="fas fa-sync me-1"></i>Update Status
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
